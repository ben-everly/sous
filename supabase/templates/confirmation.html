<h2>Confirm your email</h2>
<p>Follow this link to confirm your email and finish creating your account:</p>
<p>
  <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=signup">Confirm email</a>
</p>
<p>This link expires in about an hour and can only be used once.</p>
<p>If you didn&apos;t create an account, you can safely ignore this email.</p>
